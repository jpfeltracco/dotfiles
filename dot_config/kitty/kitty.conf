# ~/.config/kitty/kitty.conf
# Reload live with cmd+ctrl+, ; edit with cmd+, (defaults).

# ── Theme ───────────────────────────────────────────────────────────
include gruvbox-dark.conf

# ── Font ────────────────────────────────────────────────────────────
# Menlo ships with macOS. For a nicer programming font:
#   brew install --cask font-jetbrains-mono   (then set: font_family JetBrains Mono)
font_family      Menlo
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# ── macOS option/alt key ────────────────────────────────────────────
# The fix for option+b/option+f emitting ∫ ƒ etc.: treat option as Alt
# so it sends real escape sequences (ESC-b / ESC-f) that the shell reads
# as backward-word / forward-word instead of composing special glyphs.
macos_option_as_alt yes

# Make the word-motion bindings explicit too, so they work regardless of
# terminfo quirks. \x1b is ESC; ESC-b / ESC-f are the readline word moves.
map alt+b send_text all \x1bb
map alt+f send_text all \x1bf

# ── Tabs ────────────────────────────────────────────────────────────
tab_bar_edge        top
tab_bar_style       powerline
tab_powerline_style slanted
# Show tab number so cmd+N maps to what you see.
tab_title_template  "{index}: {title}"

# cmd+1..9 jump straight to that tab (9 = last tab, kitty convention).
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Handy tab management (cmd+t / cmd+w already work on macOS by default).
map cmd+shift+right next_tab
map cmd+shift+left  previous_tab

# ── Sensible defaults ───────────────────────────────────────────────
scrollback_lines           10000
enable_audio_bell          no
copy_on_select             no
macos_quit_when_last_window_closed yes
window_padding_width       6
remember_window_size       yes
confirm_os_window_close    0
